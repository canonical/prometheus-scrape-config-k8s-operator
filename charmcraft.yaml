name: prometheus-scrape-config-k8s
type: charm
summary: A set of Prometheus scrape configuration options.
description: |
  Prometheus Scrape Config K8s is a workloadless Juju charm that acts as an adapter between
  metrics providers and Prometheus on Kubernetes. It intercepts scrape jobs from upstream charms
  and allows operators to override configuration options — such as scrape interval, timeout,
  relabeling rules, and sample limits — before forwarding them to Prometheus. It is a
  complementary charm to the Canonical Observability Stack (COS):
  https://documentation.ubuntu.com/observability

  By interposing this charm between a scrape target and Prometheus, operators gain centralized
  control over scrape job settings without modifying the target charms themselves.

  Key features:

  - Override scrape job configurations (interval, timeout, proxy, relabeling) provided by
    upstream charms before they reach Prometheus.
  - Configurable sample and label limits to control ingestion volume.
  - Support for metric relabeling to filter, rename, or drop metrics at scrape time.
  - Toggle forwarding of alert rules from upstream charms.
  - Workloadless charm — no additional containers or resources required.

links:
  documentation: https://discourse.charmhub.io/t/prometheus-scrape-config-k8s-docs-index/6856
  website: https://charmhub.io/prometheus-scrape-config-k8s
  source: https://github.com/canonical/prometheus-scrape-config-k8s-operator
  issues: https://github.com/canonical/prometheus-scrape-config-k8s-operator/issues

platforms:
  ubuntu@24.04:amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]
    override-build: |
      craftctl default
      git describe --always > $CRAFT_PART_INSTALL/version

provides:
  metrics-endpoint:
    interface: prometheus_scrape

requires:
  configurable-scrape-jobs:
    interface: prometheus_scrape

config:
  options:
    scrape_interval:
      description: Frequency at which metrics are scraped.
      type: string
    scrape_timeout:
      description: Timeout interval when scraping a job.
      type: string
    proxy_url:
      description: Proxy URL for accessing metrics endpoints.
      type: string
    relabel_configs:
      description: YAML string formatted scrape target relabeling configuration.
      type: string
    metric_relabel_configs:
      description: YAML string formatted metrics relabeling configuration.
      type: string
    sample_limit:
      description: Maximum number of samples per scrape (0=unlimited)
      type: int
    label_limit:
      description: Maximum number of labels per scrape (0=unlimited)
      type: int
    label_name_length_limit:
      description: Maximum length of label name (0=unlimited)
      type: int
    label_value_length_limit:
      description: Maximum length of label value (0=unlimited)
      type: int
    forward_alert_rules:
      description: Toggle forwarding of alert rules.
      type: boolean
      default: true
